schema_version: 1

name: "ghcr.io/dataaxiom/tiecd"
description: "A simplified CICD toolchain for kubernetes deployments"
version: latest
from: "ubuntu:22.04"

envs:
  - name: PATH
    value: "$PATH:/opt/maven/bin:/opt/gradle/bin"

modules:
  repositories:
    - path: modules
  install:
    - name: base
    - name: jdk
      version: "21"
    - name: gradle
    - name: maven

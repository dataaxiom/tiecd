schema_version: 1

name: "ghcr.io/dataaxiom/tiecd"
description: "A simplified CICD toolchain for kubernetes deployments"
version: latest
from: "ubunut:22.04"

envs:
  - name: TIECD_NODE_VERSION
    value: "20"

modules:
  repositories:
    - path: modules
  install:
    - name: base
    - name: node.package.repo 
      version: "20"
    - name: node
    - name: yarn
    - name: pnpm

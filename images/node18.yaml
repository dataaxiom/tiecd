schema_version: 1

name: "ghcr.io/dataaxiom/tiecd"
description: "A simplified CICD toolchain for kubernetes deployments"
version: latest
from: "node:18-bookworm-slim"

envs:
  - name: TIECD_NODE_VERSION
    value: "18"

modules:
  repositories:
    - path: modules
  install:
    - name: base
    - name: node.package.repo 
      version: "18"
    - name: node
    - name: yarn
    - name: pnpm
